<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Identidade da marca -->
    <title>🌎 Mundo News — 📰 A verdade em primeiro lugar</title>
    <meta name="description" content="🌍 Mundo News — Notícias do Brasil e do mundo em tempo real. Artigos, opinião e informação com compromisso com a verdade. 📡 Correspondentes nas principais capitais do mundo." />
    <meta name="keywords" content="notícias, Brasil, mundo, jornalismo, tempo real, opinião, artigos, Mundo News, verdade, correspondentes" />
    <meta name="author" content="Mundo News" />
    <meta name="theme-color" content="#c41e3a" />
    <meta name="color-scheme" content="light" />
    <meta name="application-name" content="Mundo News" />
    <meta name="apple-mobile-web-app-title" content="Mundo News" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Open Graph (Facebook, WhatsApp, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="🌎 Mundo News" />
    <meta property="og:title" content="🌎 Mundo News — 📰 A verdade em primeiro lugar" />
    <meta property="og:description" content="🌍 Os fatos do Brasil e do mundo em tempo real. 🚨 Notícias urgentes, 💬 opinião e 📄 artigos com compromisso com a verdade." />
    <meta property="og:image" content="../public/og-image.svg" />
    <meta property="og:image:alt" content="Mundo News — A verdade em primeiro lugar" />
    <meta property="og:locale" content="pt_BR" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="🌎 Mundo News — 📰 A verdade em primeiro lugar" />
    <meta name="twitter:description" content="🌍 Notícias do Brasil e do mundo em tempo real. Correspondentes globais em busca da verdade." />
    <meta name="twitter:image" content="../public/og-image.svg" />
    <meta name="twitter:image:alt" content="Mundo News — Logo e slogan" />

    <!-- Ícones e manifesto -->
    <link rel="icon" type="image/svg+xml" href="../public/favicon.svg" />
    <link rel="icon" type="image/svg+xml" href="../public/logo-icon.svg" sizes="any" />
    <link rel="apple-touch-icon" href="../public/apple-touch-icon.svg" />
    <link rel="manifest" href="../public/site.webmanifest" />

    <!-- Fontes -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700;900&family=Source+Sans+3:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Live Server: CSS/JS gerados por `npm run build`. O Vite (npm run dev) ignora estes e usa main.tsx. -->
    <link rel="stylesheet" crossorigin href="../dist/assets/index.css" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="../dist/assets/index.js"></script>
  </body>
</html>
