<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 56" fill="none" role="img" aria-label="Mundo News">
  <!-- Ícone: globo + jornal -->
  <g transform="translate(4, 6)">
    <circle cx="22" cy="22" r="20" fill="#1a1a2e"/>
    <circle cx="22" cy="22" r="17" fill="none" stroke="#e8b923" stroke-width="1.2"/>
    <ellipse cx="22" cy="22" rx="8" ry="17" fill="none" stroke="#e8b923" stroke-width="1"/>
    <line x1="2" y1="22" x2="42" y2="22" stroke="#e8b923" stroke-width="1"/>
    <line x1="22" y1="2" x2="22" y2="42" stroke="#e8b923" stroke-width="0.8" opacity="0.6"/>
    <!-- Jornal sobreposto -->
    <rect x="28" y="10" width="14" height="18" rx="2" fill="#c41e3a"/>
    <line x1="31" y1="15" x2="39" y2="15" stroke="#fff" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="31" y1="19" x2="39" y2="19" stroke="#fff" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="31" y1="23" x2="36" y2="23" stroke="#fff" stroke-width="1.2" stroke-linecap="round"/>
  </g>
  <!-- Texto da marca -->
  <text x="58" y="28" font-family="Georgia, 'Merriweather', serif" font-size="22" font-weight="900" fill="#c41e3a">Mundo</text>
  <text x="58" y="48" font-family="Georgia, 'Merriweather', serif" font-size="22" font-weight="900" fill="#1a1a2e">News</text>
  <!-- Detalhe decorativo -->
  <rect x="130" y="18" width="3" height="24" rx="1" fill="#e8b923"/>
  <text x="140" y="30" font-family="Arial, sans-serif" font-size="8" font-weight="600" fill="#5c5c5c" letter-spacing="1.5">A VERDADE EM</text>
  <text x="140" y="42" font-family="Arial, sans-serif" font-size="8" font-weight="600" fill="#5c5c5c" letter-spacing="1.5">PRIMEIRO LUGAR</text>
</svg>
